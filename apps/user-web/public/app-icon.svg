<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF7A1A"/>
      <stop offset="1" stop-color="#FF3D5E"/>
    </linearGradient>
  </defs>

  <!-- 圆角播放三角，水平渐变 左橙→右红 -->
  <path fill="url(#brandGrad)" d="M 41.2 47.7 Q 32 40 32 52 L 32 148 Q 32 160 41.2 152.3 L 96.3 106.4 Q 104 100 96.3 93.6 L 41.2 47.7 Z"/>

  <!-- 左侧满高白色竖条（扬声器出音口），完全落在三角形内 -->
  <rect x="35" y="54" width="10" height="92" rx="5" fill="#FFFFFF"/>

  <!-- 三条声波，紧贴三角形右顶点，由近到远 -->
  <g fill="none" stroke="url(#brandGrad)" stroke-width="10" stroke-linecap="round">
    <path d="M 116 78 Q 128 100 116 122"/>
    <path d="M 130 64 Q 146 100 130 136"/>
    <path d="M 144 50 Q 164 100 144 150"/>
  </g>
</svg>

# 主播通 ECS 全托管 —— Nginx 配置示例
# ECS 上放到 /etc/nginx/conf.d/zhibotong.conf
#
# 端口分工：
#   80   → user-web（Nginx 直接托管静态）+ /api 反代 Node
#   8081 → admin-web（反代 Node 根，含 token 注入，及其 /api）
# Node(127.0.0.1:9000)：同时提供 /api 与 admin-web（express.static + tokenInjection + SPA fallback）
#
# 访问（先跑通用 IP，以后绑域名再开 443）：
#   user-web：http://<ECS_IP>/
#   admin  ：http://<ECS_IP>:8081/

# ─── user-web 静态 + API 反代（端口 80）───
server {
    listen 80;
    server_name _;                              # 以后绑域名替换为你的域名

    client_max_body_size 100m;                  # 上传体积（文件实际存 Supabase Storage）

    # API → Node
    location /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket（/api/chat）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }

    # user-web 静态（SPA fallback：找不到文件就回 index.html）
    location / {
        root /opt/zhibotong/apps/user-web/dist;
        try_files $uri $uri/ /index.html;
    }
}

# ─── admin-web（反代 Node 根，端口 8081）───
server {
    listen 8081;
    server_name _;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }
}

# ─── 以后绑域名开 HTTPS 时，再加一个 443 server（certbot 或阿里云证书），并把上面 80 改成跳转 ───

services:
  # 后端 API 服务
  - type: web
    name: zhibotong-api-v2
    runtime: node
    buildCommand: pnpm install --prod=false && pnpm build:admin && pnpm build:api
    startCommand: cd services/api && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # 用户端前端（静态站点）
  - type: web
    name: zhibotong-user
    runtime: static
    buildCommand: pnpm install --prod=false && pnpm build:user
    staticPublishPath: apps/user-web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
